name: default
description: |
  Mirror the seeded sharp wallet list at 5% size, $200/trade cap.

params:
  min_copy_usd: "100"
  copy_ratio: "0.05"
  max_size_per_trade_usd: "200"
  price_buffer_bps: 50
  wallet_market_cooldown_secs: 600
  max_concurrent_positions: 30
  # tracked_wallets defaults from ANALYTICS_SHARP_WALLETS env + seed pair
